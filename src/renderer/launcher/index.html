<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'" />
  <title>Arcana</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }

    nav { display: flex; background: #16213e; border-bottom: 1px solid #0f3460; }
    nav button { flex: 1; padding: 12px; background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; }
    nav button.active { color: #e94560; border-bottom: 2px solid #e94560; }
    #btn-hunting { background: #0f3460 !important; color: #e94560 !important; font-weight: bold; border-left: 1px solid #1a4a7a; }

    #content { flex: 1; overflow-y: auto; padding: 16px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
  <nav>
    <button class="active" data-tab="pets">에레멘탈</button>
    <button data-tab="stats">스탯</button>
    <button data-tab="skills">스킬</button>
    <button data-tab="items">아이템</button>
    <button data-tab="breeding">교배</button>
    <button data-tab="gacha">가챠</button>
    <button data-tab="party">파티</button>
    <button data-tab="quest">퀘스트</button>
    <button id="btn-hunting">⚔ 사냥터</button>
  </nav>

  <div id="content">
    <div id="tab-pets"     class="tab-panel active"></div>
    <div id="tab-stats"    class="tab-panel"></div>
    <div id="tab-skills"   class="tab-panel"></div>
    <div id="tab-items"    class="tab-panel"></div>
    <div id="tab-breeding" class="tab-panel"></div>
    <div id="tab-gacha"    class="tab-panel"></div>
    <div id="tab-party"    class="tab-panel"></div>
    <div id="tab-quest"    class="tab-panel"></div>
  </div>

  <script src="components/PetCard.js"></script>
  <script src="components/StatPanel.js"></script>
  <script src="components/SkillTree.js"></script>
  <script src="components/ItemPanel.js"></script>
  <script src="components/BreedingPanel.js"></script>
  <script src="components/GachaPanel.js"></script>
  <script src="components/PartyPanel.js"></script>
  <script src="components/QuestPanel.js"></script>
  <script src="launcher.js"></script>
</body>
</html>
